name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    permissions:
      id-token: write # required for azure/login's OIDC federated credential exchange
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: pyinstaller packaging/build_exe.spec --noconfirm --distpath dist --workpath build

      # Unsigned builds still trigger SmartScreen/Gatekeeper warnings on first
      # run regardless of this step — only a paid code-signing certificate
      # (see README) actually removes that. This just gives users a way to
      # verify the download wasn't tampered with in transit.
      - name: Generate SHA256 checksums
        shell: python
        run: |
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          lines = []
          for path in sorted(dist.rglob("*")):
              if path.is_file():
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  lines.append(f"{digest}  {path.relative_to(dist)}")
          Path("dist/SHA256SUMS.txt").write_text("\n".join(lines) + "\n")

      # Signs via Azure Artifact Signing (azure/artifact-signing-action), which
      # replaced the older raw-PFX signtool approach. No-op until
      # AZURE_SIGNING_READY is set to 'true' (a repo variable, not secret) —
      # flip that on once the Artifact Signing Account's identity validation
      # is approved and its "EasyPostDesktop" certificate profile exists (see
      # README's "Windows SmartScreen warning" section); everything else in
      # this workflow already works either way. AZURE_CLIENT_ID/TENANT_ID/
      # SUBSCRIPTION_ID (repo secrets) authenticate via OIDC federated
      # credential — no client secret is stored anywhere.
      - name: Azure login
        if: matrix.os == 'windows-latest' && vars.AZURE_SIGNING_READY == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows build
        if: matrix.os == 'windows-latest' && vars.AZURE_SIGNING_READY == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: https://weu.codesigning.azure.net/
          signing-account-name: EasyPostDesktop
          certificate-profile-name: EasyPostDesktop
          files-folder: ${{ github.workspace }}\dist\EasyPostDesktop
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyPostDesktop-${{ matrix.os }}
          path: dist/*
