name = "easypost-license-webhook"
main = "src/worker.js"
compatibility_date = "2025-06-01"
# node:crypto (Ed25519 signing + HMAC) requires nodejs_compat.
compatibility_flags = ["nodejs_compat"]

# The seat ledger: which computers each licence is on, plus revocations.
[[d1_databases]]
binding = "LICENSES"
database_name = "easypost-licenses"
database_id = "2deb96f3-3585-4c03-a147-11547e5f76c1"

# Non-secret configuration. Set the real values here before deploying.
[vars]
# Which tier each Paddle price buys. A price that is not listed mints nothing,
# so a new product cannot hand out licences before its tier has been decided.
PRICE_TIERS = '{"pri_01ky2hekjfm1c9nspf5pnqv0jv":"personal","pri_01ky3fxcf519vwq9vw8cwy35k9":"business","pri_01ky3fxdv0gcg0xnf04npzpb2k":"organisation"}'
# Legacy single-price setting, read as the entry tier when PRICE_TIERS omits it.
PADDLE_PRICE_ID = "pri_01ky2hekjfm1c9nspf5pnqv0jv"
LICENSE_FROM_EMAIL = "licenses@easy-post.spencerfields.com"
CONTACT_TO_EMAIL = "Apps@spencerfields.com"
# PADDLE_API_BASE = "https://api.paddle.com"      # sandbox: https://sandbox-api.paddle.com
# LICENSE_PRODUCT_ID = "easypost-desktop"

# Secrets are NOT stored here — set them with `wrangler secret put`:
#   LICENSE_PRIVATE_KEY_PEM  PADDLE_WEBHOOK_SECRET  PADDLE_API_KEY
#   RESEND_API_KEY  CONTACT_SHARED_SECRET
